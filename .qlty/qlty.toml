config_version = "0"

exclude_patterns = [
    "*_min.*",
    "*-min.*",
    "*.min.*",
    "**/.yarn/**",
    "**/*.d.ts",
    "**/assets/**",
    "**/bower_components/**",
    "**/build/**",
    "**/cache/**",
    "**/db/**",
    "**/deps/**",
    "**/dist/**",
    "**/extern/**",
    "**/external/**",
    "**/generated/**",
    "**/Godeps/**",
    "**/gradlew/**",
    "**/mvnw/**",
    "**/node_modules/**",
    "**/protos/**",
    "**/seed/**",
    "**/target/**",
    "**/templates/**",
    "**/testdata/**",
    "**/vendor/**",
    ".qlty/configs/**"
]

test_patterns = [
    "**/test/**",
    "**/tests/**",
    "**/spec/**",
    "**/*.test.*",
    "**/*.spec.*",
    "**/*_test.*",
    "**/*_spec.*",
    "**/test_*.*",
    "**/spec_*.*"
]

[runtimes.enabled]
php = "8.3"

[smells]
mode = "comment"

[[source]]
name = "default"
default = true

[[source]]
name = "sinemacula"
repository = "https://github.com/sinemacula/coding-standards"
tag = "v1.12.2"

[[plugin]]
name = "actionlint"

[[plugin]]
name = "checkov"

[[plugin]]
name = "markdownlint"
mode = "comment"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "php-codesniffer"
version = "4.0.1"
mode = "comment"
package_file = "composer.json"
package_filters = ["slevomat", "dealerdirect", "sinemacula"]

# phpcs 4.x exits 3 on findings; without this qlty treats that as a hard error
# and drops every finding instead of reporting them.
[plugins.definitions.php-codesniffer.drivers.lint]
success_codes = [0, 1, 2, 3]

[[plugin]]
name = "php-cs-fixer"
# Pinned to the last php-cs-fixer release whose symfony/console stays on the 7.x
# line. 3.90+ pulls symfony/console 8 (requires PHP 8.4.1 and uses 8.4-only
# syntax), which qlty's PHP 8.3 runner cannot parse. Bump once the runner ships
# PHP 8.4.
version = "3.89.0"
package_file = "composer.json"
package_filters = ["sinemacula"]

[[plugin]]
name = "radarlint-php"
mode = "comment"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "trivy"
drivers = [
    "config",
    "fs-vuln",
]

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "yamllint"

[[plugin]]
name = "phpstan"
version = "2.1.46"

# phpstan needs the project's vendor tree to resolve types, so install it into
# the sandbox before linting. The scoped `--ignore-platform-req='ext-*'` keeps
# qlty's PHP 8.3 runner from pulling a PHP 8.4 dependency set; a blanket
# `--ignore-platform-reqs` would break the bootstrap.
[plugins.definitions.phpstan.drivers.lint]
prepare_script = "~/.qlty/cache/tools/composer/generic-42cc848a9f5e/composer.phar install --no-scripts --ignore-platform-req='ext-*'"
